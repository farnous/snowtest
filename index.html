<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Exam Quiz</title>
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/@tabler/icons-webfont@3.19.0/dist/tabler-icons.min.css">
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

  :root {
    --bg: #ffffff;
    --bg-secondary: #f5f5f3;
    --bg-tertiary: #eeede8;
    --text: #1a1a1a;
    --text-muted: #666;
    --text-hint: #999;
    --border: rgba(0,0,0,0.12);
    --border-md: rgba(0,0,0,0.2);
    --radius-md: 8px;
    --radius-lg: 12px;
    --radius-xl: 16px;
    --green-bg: #eaf3de;
    --green-text: #27500a;
    --green-border: #639922;
    --red-bg: #fcebeb;
    --red-text: #791f1f;
    --red-border: #e24b4a;
    --blue-bg: #e6f1fb;
    --blue-text: #0c447c;
    --blue-border: #378add;
    --amber-bg: #faeeda;
    --amber-text: #633806;
    --amber-border: #ba7517;
    --purple-bg: #eeedfe;
    --purple-text: #3c3489;
    --purple-border: #7f77dd;
  }

  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1e;
      --bg-secondary: #2a2a2a;
      --bg-tertiary: #333;
      --text: #f0f0f0;
      --text-muted: #aaa;
      --text-hint: #777;
      --border: rgba(255,255,255,0.12);
      --border-md: rgba(255,255,255,0.22);
      --green-bg: #173404;
      --green-text: #c0dd97;
      --green-border: #3b6d11;
      --red-bg: #501313;
      --red-text: #f7c1c1;
      --red-border: #a32d2d;
      --blue-bg: #042c53;
      --blue-text: #b5d4f4;
      --blue-border: #185fa5;
      --amber-bg: #412402;
      --amber-text: #fac775;
      --amber-border: #854f0b;
      --purple-bg: #26215c;
      --purple-text: #cecbf6;
      --purple-border: #534ab7;
    }
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
    background: var(--bg-tertiary);
    color: var(--text);
    min-height: 100vh;
    font-size: 15px;
    line-height: 1.6;
  }

  .app { max-width: 780px; margin: 0 auto; padding: 1.5rem 1rem 3rem; }

  .screen { display: none; }
  .screen.active { display: block; }

  h1 { font-size: 22px; font-weight: 500; margin-bottom: 0.25rem; }
  h2 { font-size: 18px; font-weight: 500; margin-bottom: 1rem; }
  h3 { font-size: 16px; font-weight: 500; }

  p { color: var(--text-muted); font-size: 14px; }

  .card {
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-lg);
    padding: 1.25rem 1.5rem;
    margin-bottom: 1rem;
  }

  .card-flat {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem 1.25rem;
    margin-bottom: 0.75rem;
  }

  button {
    cursor: pointer;
    font-family: inherit;
    font-size: 14px;
    border-radius: var(--radius-md);
    border: 0.5px solid var(--border-md);
    background: transparent;
    color: var(--text);
    padding: 8px 16px;
    transition: background 0.15s, transform 0.1s;
  }
  button:hover { background: var(--bg-secondary); }
  button:active { transform: scale(0.98); }

  .btn-primary {
    background: var(--text);
    color: var(--bg);
    border-color: var(--text);
    font-weight: 500;
  }
  .btn-primary:hover { opacity: 0.85; background: var(--text); }

  .btn-danger {
    background: var(--red-bg);
    color: var(--red-text);
    border-color: var(--red-border);
  }
  .btn-danger:hover { opacity: 0.85; background: var(--red-bg); }

  .btn-success {
    background: var(--green-bg);
    color: var(--green-text);
    border-color: var(--green-border);
  }

  .btn-sm { padding: 5px 12px; font-size: 13px; }

  input[type="file"] { display: none; }

  .upload-zone {
    border: 1.5px dashed var(--border-md);
    border-radius: var(--radius-lg);
    padding: 2.5rem 2rem;
    text-align: center;
    cursor: pointer;
    transition: background 0.15s, border-color 0.15s;
    background: var(--bg);
    margin-bottom: 1rem;
  }
  .upload-zone:hover { background: var(--bg-secondary); border-color: var(--blue-border); }
  .upload-zone i { font-size: 32px; color: var(--text-hint); display: block; margin-bottom: 0.75rem; }

  .exam-list { list-style: none; }
  .exam-item {
    display: flex;
    align-items: center;
    justify-content: space-between;
    background: var(--bg);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 0.9rem 1.1rem;
    margin-bottom: 0.5rem;
    gap: 1rem;
  }
  .exam-item-info { flex: 1; min-width: 0; }
  .exam-item-title { font-weight: 500; font-size: 14px; white-space: nowrap; overflow: hidden; text-overflow: ellipsis; }
  .exam-item-meta { font-size: 12px; color: var(--text-hint); margin-top: 2px; }
  .exam-item-actions { display: flex; gap: 6px; flex-shrink: 0; }

  .badge {
    display: inline-flex;
    align-items: center;
    gap: 4px;
    font-size: 12px;
    font-weight: 500;
    padding: 3px 9px;
    border-radius: 20px;
  }
  .badge-green { background: var(--green-bg); color: var(--green-text); }
  .badge-amber { background: var(--amber-bg); color: var(--amber-text); }
  .badge-blue { background: var(--blue-bg); color: var(--blue-text); }
  .badge-purple { background: var(--purple-bg); color: var(--purple-text); }
  .badge-red { background: var(--red-bg); color: var(--red-text); }

  .progress-bar-wrap {
    background: var(--bg-secondary);
    border-radius: 20px;
    height: 6px;
    overflow: hidden;
    margin: 0.5rem 0 1rem;
  }
  .progress-bar-fill {
    height: 100%;
    border-radius: 20px;
    background: var(--text);
    transition: width 0.3s ease;
  }

  .question-header {
    display: flex;
    align-items: center;
    justify-content: space-between;
    margin-bottom: 1rem;
    gap: 1rem;
    flex-wrap: wrap;
  }
  .question-nav { font-size: 13px; color: var(--text-muted); }

  .question-text {
    font-size: 15px;
    font-weight: 400;
    line-height: 1.7;
    margin-bottom: 1.25rem;
    white-space: pre-wrap;
  }

  .type-label {
    font-size: 12px;
    color: var(--text-hint);
    margin-bottom: 0.75rem;
  }

  .choices { list-style: none; display: flex; flex-direction: column; gap: 8px; }

  .choice {
    display: flex;
    align-items: flex-start;
    gap: 10px;
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 10px 14px;
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
    user-select: none;
  }
  .choice:hover:not(.disabled) { background: var(--bg-tertiary); border-color: var(--border-md); }
  .choice.selected { border-color: var(--blue-border); background: var(--blue-bg); }
  .choice.correct { border-color: var(--green-border); background: var(--green-bg); }
  .choice.incorrect { border-color: var(--red-border); background: var(--red-bg); }
  .choice.missed { border-color: var(--amber-border); background: var(--amber-bg); }
  .choice.disabled { cursor: default; }

  .choice-id {
    font-size: 13px;
    font-weight: 500;
    min-width: 20px;
    color: var(--text-muted);
    padding-top: 1px;
  }
  .choice.selected .choice-id { color: var(--blue-text); }
  .choice.correct .choice-id { color: var(--green-text); }
  .choice.incorrect .choice-id { color: var(--red-text); }
  .choice.missed .choice-id { color: var(--amber-text); }

  .choice-text { font-size: 14px; line-height: 1.5; flex: 1; }
  .choice.correct .choice-text { color: var(--green-text); }
  .choice.incorrect .choice-text { color: var(--red-text); }
  .choice.missed .choice-text { color: var(--amber-text); }

  .choice-icon { font-size: 16px; margin-left: auto; flex-shrink: 0; }

  .drag-area { display: flex; gap: 1.25rem; flex-wrap: wrap; }
  .drag-col { flex: 1; min-width: 240px; }
  .drag-col-title { font-size: 12px; font-weight: 500; color: var(--text-hint); text-transform: uppercase; letter-spacing: 0.05em; margin-bottom: 8px; }

  .drag-item {
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: var(--radius-md);
    padding: 8px 12px;
    font-size: 13px;
    margin-bottom: 6px;
    cursor: grab;
    user-select: none;
    transition: opacity 0.15s, box-shadow 0.15s;
  }
  .drag-item:active { cursor: grabbing; opacity: 0.7; }
  .drag-item.dragging { opacity: 0.4; }
  .drag-item.used { opacity: 0.4; cursor: default; }

  .drop-target {
    min-height: 54px;
    border: 1.5px dashed var(--border-md);
    border-radius: var(--radius-md);
    padding: 6px;
    margin-bottom: 8px;
    transition: background 0.15s, border-color 0.15s;
    position: relative;
  }
  .drop-target.drag-over { background: var(--blue-bg); border-color: var(--blue-border); }
  .drop-target-label {
    font-size: 12px;
    color: var(--text-hint);
    padding: 4px 6px;
    line-height: 1.4;
  }
  .drop-target .drag-item { margin-bottom: 0; cursor: default; }
  .drop-target .drag-item .remove-drop { cursor: pointer; font-size: 13px; float: right; color: var(--text-hint); }

  .drop-target.correct-target { border-color: var(--green-border); background: var(--green-bg); }
  .drop-target.incorrect-target { border-color: var(--red-border); background: var(--red-bg); }

  .feedback-box {
    border-radius: var(--radius-md);
    padding: 10px 14px;
    font-size: 13px;
    line-height: 1.5;
    margin-top: 1rem;
  }
  .feedback-correct { background: var(--green-bg); color: var(--green-text); border: 0.5px solid var(--green-border); }
  .feedback-incorrect { background: var(--red-bg); color: var(--red-text); border: 0.5px solid var(--red-border); }

  .question-actions {
    display: flex;
    gap: 10px;
    margin-top: 1.25rem;
    flex-wrap: wrap;
    align-items: center;
  }

  .stat-grid {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(130px, 1fr));
    gap: 12px;
    margin: 1rem 0;
  }
  .stat-card {
    background: var(--bg-secondary);
    border-radius: var(--radius-md);
    padding: 1rem;
    text-align: center;
  }
  .stat-label { font-size: 12px; color: var(--text-muted); margin-bottom: 4px; }
  .stat-value { font-size: 24px; font-weight: 500; }

  .top-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-bottom: 1.5rem;
  }
  .top-bar h1 { flex: 1; }

  .filter-bar {
    display: flex;
    gap: 8px;
    flex-wrap: wrap;
    margin-bottom: 1.25rem;
    align-items: center;
  }
  .filter-bar span { font-size: 13px; color: var(--text-muted); }

  .tag { font-size: 12px; background: var(--bg-secondary); border: 0.5px solid var(--border); border-radius: 20px; padding: 3px 10px; color: var(--text-muted); }

  .empty-state { text-align: center; padding: 3rem 1rem; color: var(--text-hint); }
  .empty-state i { font-size: 36px; display: block; margin-bottom: 0.75rem; }

  hr { border: none; border-top: 0.5px solid var(--border); margin: 1.25rem 0; }

  select {
    font-family: inherit;
    font-size: 14px;
    background: var(--bg);
    color: var(--text);
    border: 0.5px solid var(--border-md);
    border-radius: var(--radius-md);
    padding: 6px 10px;
    cursor: pointer;
  }

  .toast {
    position: fixed;
    bottom: 1.5rem;
    left: 50%;
    transform: translateX(-50%);
    background: var(--text);
    color: var(--bg);
    padding: 8px 18px;
    border-radius: 20px;
    font-size: 13px;
    z-index: 999;
    opacity: 0;
    transition: opacity 0.25s;
    pointer-events: none;
  }
  .toast.show { opacity: 1; }

  /* Favorites */
  .fav-btn {
    background: none;
    border: none;
    padding: 4px 6px;
    font-size: 18px;
    color: var(--text-hint);
    cursor: pointer;
    border-radius: var(--radius-md);
    transition: color 0.15s, transform 0.1s;
    flex-shrink: 0;
  }
  .fav-btn:hover { color: #f59e0b; background: var(--amber-bg); }
  .fav-btn.active { color: #f59e0b; }
  .fav-btn:active { transform: scale(0.9); }

  .screen-favorites .exam-item { position: relative; }

  .fav-source-label {
    font-size: 11px;
    color: var(--text-hint);
    background: var(--bg-secondary);
    border: 0.5px solid var(--border);
    border-radius: 10px;
    padding: 2px 8px;
    margin-top: 3px;
    display: inline-block;
  }

  /* Clickable question list items */
  .menu-question-item {
    cursor: pointer;
    transition: background 0.12s, border-color 0.12s;
  }
  .menu-question-item:hover { background: var(--bg-secondary); border-color: var(--border-md); }
  .menu-question-item:hover .exam-item-title { color: var(--blue-text); }

  /* Nav tabs on home */
  .tab-bar {
    display: flex;
    gap: 4px;
    margin-bottom: 1rem;
    border-bottom: 1px solid var(--border);
  }
  .tab-btn {
    border: none;
    background: none;
    border-bottom: 2px solid transparent;
    border-radius: 0;
    padding: 8px 14px;
    font-size: 14px;
    color: var(--text-muted);
    font-weight: 500;
    margin-bottom: -1px;
    transition: color 0.15s, border-color 0.15s;
  }
  .tab-btn:hover { background: none; color: var(--text); }
  .tab-btn.active { color: var(--text); border-bottom-color: var(--text); }

  .tab-panel { display: none; }
  .tab-panel.active { display: block; }

  @media (max-width: 540px) {
    .drag-area { flex-direction: column; }
    .question-actions { flex-direction: column; }
    .question-actions button { width: 100%; }
  }
</style>
</head>
<body>
<div class="app">

  <!-- SCREEN: Home -->
  <div id="screen-home" class="screen active">
    <div class="top-bar">
      <h1><i class="ti ti-school" aria-hidden="true"></i> Exam Quiz</h1>
    </div>

    <label for="file-input">
      <div class="upload-zone" id="upload-zone">
        <i class="ti ti-file-upload" aria-hidden="true"></i>
        <h3>Upload exam JSON</h3>
        <p style="margin-top:4px;">Click or drag a JSON file exported from your exam</p>
      </div>
    </label>
    <input type="file" id="file-input" accept=".json">

    <div class="tab-bar">
      <button class="tab-btn active" data-tab="exams"><i class="ti ti-books" aria-hidden="true"></i> Exams</button>
      <button class="tab-btn" data-tab="favorites"><i class="ti ti-star" aria-hidden="true"></i> Favorites <span id="fav-count-badge" style="font-size:11px;"></span></button>
    </div>

    <!-- Tab: Exams -->
    <div class="tab-panel active" id="tab-exams">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
        <h2 style="margin:0;">Saved exams</h2>
        <div style="display:flex;gap:6px;align-items:center;">
          <button class="btn-sm" id="refresh-remote-btn" title="Re-fetch exams from GitHub" style="display:none;">
            <i class="ti ti-refresh" aria-hidden="true"></i>
          </button>
          <button class="btn-sm" id="clear-all-btn" style="color:var(--red-text);border-color:var(--red-border);">
            <i class="ti ti-trash" aria-hidden="true"></i> Clear all
          </button>
        </div>
      </div>
      <div id="remote-status" style="font-size:12px;margin-bottom:0.75rem;min-height:16px;"></div>
      <ul class="exam-list" id="exam-list"></ul>
      <div class="empty-state" id="no-exams-msg" style="display:none;">
        <i class="ti ti-books" aria-hidden="true"></i>
        <p>No exams yet. Upload a JSON file to get started.</p>
      </div>
    </div>

    <!-- Tab: Favorites -->
    <div class="tab-panel" id="tab-favorites">
      <div style="display:flex;align-items:center;justify-content:space-between;margin-bottom:0.75rem;">
        <h2 style="margin:0;">Favorite questions</h2>
        <button class="btn-sm btn-primary" id="practice-favs-btn"><i class="ti ti-player-play" aria-hidden="true"></i> Practice all</button>
      </div>
      <ul class="exam-list" id="fav-list"></ul>
      <div class="empty-state" id="no-favs-msg" style="display:none;">
        <i class="ti ti-star" aria-hidden="true"></i>
        <p>No favorites yet. Star a question while practicing to add it here.</p>
      </div>
    </div>
  </div>

  <!-- SCREEN: Exam Menu -->
  <div id="screen-exam-menu" class="screen">
    <div class="top-bar">
      <button id="back-to-home" class="btn-sm"><i class="ti ti-arrow-left" aria-hidden="true"></i> Back</button>
      <h1 id="menu-exam-title" style="font-size:17px;"></h1>
    </div>

    <div class="stat-grid" id="menu-stats"></div>

    <div class="filter-bar">
      <span>Show:</span>
      <select id="filter-mode">
        <option value="all">All questions</option>
        <option value="unanswered">Not yet correct</option>
        <option value="wrong">Answered wrong</option>
        <option value="correct">Answered correct</option>
      </select>
      <select id="order-mode">
        <option value="sequential">In order</option>
        <option value="random">Randomized</option>
      </select>
    </div>

    <div style="display:flex;gap:10px;flex-wrap:wrap;">
      <button class="btn-primary" id="start-quiz-btn"><i class="ti ti-player-play" aria-hidden="true"></i> Start quiz</button>
      <button id="reset-progress-btn" class="btn-sm" style="color:var(--red-text);border-color:var(--red-border);">
        <i class="ti ti-refresh" aria-hidden="true"></i> Reset progress
      </button>
    </div>

    <hr>

    <h3 style="margin-bottom:0.75rem;">Question list</h3>
    <ul id="menu-question-list" class="exam-list"></ul>
  </div>

  <!-- SCREEN: Quiz -->
  <div id="screen-quiz" class="screen">
    <div class="top-bar">
      <button id="quiz-back-btn" class="btn-sm"><i class="ti ti-x" aria-hidden="true"></i> Exit</button>
      <span id="quiz-exam-label" style="font-size:13px;color:var(--text-muted);flex:1;text-align:center;"></span>
      <span id="quiz-counter" style="font-size:13px;color:var(--text-muted);"></span>
    </div>

    <div class="progress-bar-wrap">
      <div class="progress-bar-fill" id="quiz-progress-fill" style="width:0%"></div>
    </div>

    <div class="card" id="quiz-card">
      <div class="question-header">
        <div>
          <span id="q-type-label" class="type-label"></span>
          <p class="question-nav" id="q-nav-label"></p>
        </div>
        <div style="display:flex;gap:6px;align-items:center;">
          <div style="display:flex;gap:6px;flex-wrap:wrap;" id="q-badges"></div>
          <button class="fav-btn" id="q-fav-btn" title="Add to favorites" aria-label="Toggle favorite">
            <i class="ti ti-star" aria-hidden="true"></i>
          </button>
        </div>
      </div>
      <div class="question-text" id="q-text"></div>
      <ul class="choices" id="q-choices"></ul>
      <div id="q-drag-area"></div>
      <div id="q-feedback" style="display:none;"></div>
      <div class="question-actions" id="q-actions"></div>
    </div>
  </div>

  <!-- SCREEN: Results -->
  <div id="screen-results" class="screen">
    <div class="top-bar">
      <h1>Session complete</h1>
    </div>
    <div class="stat-grid" id="results-stats"></div>
    <div style="display:flex;gap:10px;margin-top:1rem;flex-wrap:wrap;">
      <button class="btn-primary" id="results-continue-btn"><i class="ti ti-arrow-right" aria-hidden="true"></i> Continue exam</button>
      <button id="results-home-btn"><i class="ti ti-home" aria-hidden="true"></i> Home</button>
    </div>
  </div>

</div>

<div class="toast" id="toast"></div>

<script>
const STORAGE_KEY = 'examquiz_v2';
const FAV_KEY = 'examquiz_favorites';

function loadStore() {
  try { return JSON.parse(localStorage.getItem(STORAGE_KEY)) || {}; } catch { return {}; }
}
function saveStore(s) { localStorage.setItem(STORAGE_KEY, JSON.stringify(s)); }

// Favorites: stored as { examId_qId: { examId, examTitle, question } }
function loadFavs() {
  try { return JSON.parse(localStorage.getItem(FAV_KEY)) || {}; } catch { return {}; }
}
function saveFavs(f) { localStorage.setItem(FAV_KEY, JSON.stringify(f)); }

function isFav(examId, qId) { return !!favs[examId + '_' + qId]; }
function toggleFav(examId, qId) {
  const key = examId + '_' + qId;
  if (favs[key]) {
    delete favs[key];
    saveFavs(favs);
    return false;
  } else {
    const q = (store[examId]?.questions || []).find(q => q.id === qId);
    if (q) favs[key] = { examId, examTitle: store[examId]?.meta?.title || examId, question: q };
    saveFavs(favs);
    return true;
  }
}

function showToast(msg, dur = 2000) {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.classList.add('show');
  setTimeout(() => t.classList.remove('show'), dur);
}

function showScreen(id) {
  document.querySelectorAll('.screen').forEach(s => s.classList.remove('active'));
  document.getElementById('screen-' + id).classList.add('active');
}

let store = loadStore();
let favs = loadFavs();
let currentExamId = null;
let quizQueue = [];
let quizIndex = 0;
let sessionCorrect = 0;
let sessionTotal = 0;
let isFavoritesMode = false; // true when practicing favorites

function getExamProgress(examId) {
  return store[examId]?.progress || {};
}

function saveProgress(examId, qId, result) {
  if (!store[examId]) store[examId] = { progress: {} };
  if (!store[examId].progress) store[examId].progress = {};
  store[examId].progress[qId] = result;
  saveStore(store);
}

function resetProgress(examId) {
  if (store[examId]) { store[examId].progress = {}; saveStore(store); }
}

function renderHome() {
  const list = document.getElementById('exam-list');
  const noMsg = document.getElementById('no-exams-msg');
  const exams = Object.entries(store).filter(([k, v]) => v.meta);

  list.innerHTML = '';
  if (!exams.length) { noMsg.style.display = ''; }
  else { noMsg.style.display = 'none'; }

  exams.forEach(([id, data]) => {
    const total = data.questions?.length || 0;
    const prog = data.progress || {};
    const correct = Object.values(prog).filter(v => v === 'correct').length;
    const wrong = Object.values(prog).filter(v => v === 'wrong').length;
    const pct = total ? Math.round(correct / total * 100) : 0;

    const li = document.createElement('li');
    li.className = 'exam-item';
    li.innerHTML = `
      <div class="exam-item-info">
        <div class="exam-item-title">${data.meta.title || id}</div>
        <div class="exam-item-meta">${total} questions &nbsp;·&nbsp; ${pct}% correct &nbsp;·&nbsp; ${wrong} wrong</div>
      </div>
      <div class="exam-item-actions">
        <button class="btn-sm btn-primary" data-id="${id}"><i class="ti ti-player-play" aria-hidden="true"></i> Start</button>
        <button class="btn-sm btn-danger" data-del="${id}"><i class="ti ti-trash" aria-hidden="true"></i></button>
      </div>`;
    list.appendChild(li);
  });

  list.querySelectorAll('[data-id]').forEach(btn => {
    btn.addEventListener('click', () => openExamMenu(btn.dataset.id));
  });
  list.querySelectorAll('[data-del]').forEach(btn => {
    btn.addEventListener('click', () => {
      if (confirm('Delete this exam?')) { delete store[btn.dataset.del]; saveStore(store); renderHome(); }
    });
  });

  renderFavorites();
}

function renderFavorites() {
  const favList = document.getElementById('fav-list');
  const noFavMsg = document.getElementById('no-favs-msg');
  const favEntries = Object.values(favs);
  const countBadge = document.getElementById('fav-count-badge');

  countBadge.textContent = favEntries.length ? `(${favEntries.length})` : '';
  favList.innerHTML = '';

  if (!favEntries.length) { noFavMsg.style.display = ''; return; }
  noFavMsg.style.display = 'none';

  favEntries.forEach(({ examId, examTitle, question: q }) => {
    const li = document.createElement('li');
    li.className = 'exam-item menu-question-item';
    li.innerHTML = `
      <div class="exam-item-info" style="cursor:pointer;">
        <div class="exam-item-title">${q.question.substring(0, 90)}${q.question.length > 90 ? '…' : ''}</div>
        <span class="fav-source-label"><i class="ti ti-book" aria-hidden="true"></i> ${examTitle}</span>
      </div>
      <div class="exam-item-actions">
        <button class="btn-sm fav-remove-btn" data-exam="${examId}" data-qid="${q.id}" title="Remove from favorites" style="color:var(--red-text);border-color:var(--red-border);">
          <i class="ti ti-star-off" aria-hidden="true"></i>
        </button>
      </div>`;

    li.querySelector('.exam-item-info').addEventListener('click', () => {
      startSingleQuestion(examId, q.id);
    });
    li.querySelector('.fav-remove-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      toggleFav(examId, q.id);
      renderFavorites();
      showToast('Removed from favorites');
    });
    favList.appendChild(li);
  });
}

function openExamMenu(examId) {
  currentExamId = examId;
  const data = store[examId];
  const questions = data.questions || [];
  const prog = data.progress || {};
  const correct = Object.values(prog).filter(v => v === 'correct').length;
  const wrong = Object.values(prog).filter(v => v === 'wrong').length;
  const unanswered = questions.length - Object.keys(prog).length;
  const notCorrect = questions.filter(q => prog[q.id] !== 'correct').length;

  document.getElementById('menu-exam-title').textContent = data.meta.title;
  document.getElementById('menu-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">Total</div><div class="stat-value">${questions.length}</div></div>
    <div class="stat-card"><div class="stat-label">Correct</div><div class="stat-value" style="color:var(--green-text)">${correct}</div></div>
    <div class="stat-card"><div class="stat-label">Wrong</div><div class="stat-value" style="color:var(--red-text)">${wrong}</div></div>
    <div class="stat-card"><div class="stat-label">Unanswered</div><div class="stat-value">${unanswered}</div></div>
    <div class="stat-card"><div class="stat-label">Not correct</div><div class="stat-value" style="color:var(--amber-text)">${notCorrect}</div></div>
  `;

  const qList = document.getElementById('menu-question-list');
  qList.innerHTML = '';
  questions.forEach((q, i) => {
    const status = prog[q.id];
    let badge = '';
    if (status === 'correct') badge = '<span class="badge badge-green"><i class="ti ti-check"></i> Correct</span>';
    else if (status === 'wrong') badge = '<span class="badge badge-red"><i class="ti ti-x"></i> Wrong</span>';
    else badge = '<span class="badge badge-amber">Unanswered</span>';

    const favIcon = isFav(examId, q.id) ? 'ti-star-filled' : 'ti-star';

    const li = document.createElement('li');
    li.className = 'exam-item menu-question-item';
    li.title = 'Click to practice this question';
    li.innerHTML = `
      <div class="exam-item-info" style="pointer-events:none;">
        <div class="exam-item-title">${i + 1}. ${q.question.substring(0, 80)}${q.question.length > 80 ? '…' : ''}</div>
        <div class="exam-item-meta">${q.type}</div>
      </div>
      <div style="display:flex;gap:6px;align-items:center;">
        <div>${badge}</div>
        <button class="fav-btn ${isFav(examId, q.id) ? 'active' : ''}" data-fav-exam="${examId}" data-fav-q="${q.id}" title="Toggle favorite" style="font-size:15px;">
          <i class="ti ${favIcon}" aria-hidden="true"></i>
        </button>
      </div>`;

    // Click on row to jump to question
    li.addEventListener('click', (e) => {
      if (e.target.closest('.fav-btn')) return;
      startSingleQuestion(examId, q.id);
    });

    // Fav button
    li.querySelector('.fav-btn').addEventListener('click', (e) => {
      e.stopPropagation();
      const added = toggleFav(examId, q.id);
      const btn = e.currentTarget;
      btn.classList.toggle('active', added);
      btn.querySelector('i').className = `ti ${added ? 'ti-star-filled' : 'ti-star'}`;
      showToast(added ? '⭐ Added to favorites' : 'Removed from favorites');
    });

    qList.appendChild(li);
  });

  showScreen('exam-menu');
}

function buildQueue(examId, filterMode, orderMode) {
  const data = store[examId];
  const questions = data.questions || [];
  const prog = data.progress || {};

  let filtered = questions;
  if (filterMode === 'unanswered') filtered = questions.filter(q => prog[q.id] !== 'correct');
  else if (filterMode === 'wrong') filtered = questions.filter(q => prog[q.id] === 'wrong');
  else if (filterMode === 'correct') filtered = questions.filter(q => prog[q.id] === 'correct');

  if (orderMode === 'random') {
    filtered = [...filtered].sort(() => Math.random() - 0.5);
  }
  return filtered;
}

function startSingleQuestion(examId, qId) {
  currentExamId = examId;
  isFavoritesMode = false;
  const q = (store[examId]?.questions || []).find(q => q.id === qId);
  if (!q) { showToast('Question not found'); return; }
  quizQueue = [q];
  quizIndex = 0;
  sessionCorrect = 0;
  sessionTotal = 0;
  document.getElementById('quiz-exam-label').textContent = store[examId].meta.title;
  showScreen('quiz');
  renderQuestion();
}

function startFavoritesPractice() {
  const entries = Object.values(favs);
  if (!entries.length) { showToast('No favorites to practice!'); return; }
  isFavoritesMode = true;
  // Group by exam for progress tracking — use first exam as currentExamId but we save per-exam
  // We'll treat favorites as a special multi-exam queue
  quizQueue = entries.map(({ examId, question: q }) => ({ ...q, _examId: examId }));
  quizQueue = [...quizQueue].sort(() => Math.random() - 0.5);
  quizIndex = 0;
  sessionCorrect = 0;
  sessionTotal = 0;
  currentExamId = quizQueue[0]._examId; // fallback
  document.getElementById('quiz-exam-label').textContent = '⭐ Favorites Practice';
  showScreen('quiz');
  renderQuestion();
}

function startQuiz() {
  isFavoritesMode = false;
  const filterMode = document.getElementById('filter-mode').value;
  const orderMode = document.getElementById('order-mode').value;
  quizQueue = buildQueue(currentExamId, filterMode, orderMode);

  if (!quizQueue.length) { showToast('No questions match that filter.'); return; }

  quizIndex = 0;
  sessionCorrect = 0;
  sessionTotal = 0;
  document.getElementById('quiz-exam-label').textContent = store[currentExamId].meta.title;
  showScreen('quiz');
  renderQuestion();
}

function renderQuestion() {
  if (quizIndex >= quizQueue.length) { showResults(); return; }

  const q = quizQueue[quizIndex];
  // In favorites mode each question may belong to a different exam
  if (isFavoritesMode && q._examId) currentExamId = q._examId;

  const pct = Math.round(quizIndex / quizQueue.length * 100);
  document.getElementById('quiz-progress-fill').style.width = pct + '%';
  document.getElementById('quiz-counter').textContent = `${quizIndex + 1} / ${quizQueue.length}`;

  const typeLabelMap = { single_choice: 'Single choice', multiple_choice: 'Multiple choice — choose ' + (q.select_count || 2), drag_and_drop: 'Drag and drop' };
  document.getElementById('q-type-label').textContent = typeLabelMap[q.type] || q.type;
  document.getElementById('q-nav-label').textContent = `Question ${q.id}`;
  document.getElementById('q-text').textContent = q.question;

  const badges = document.getElementById('q-badges');
  badges.innerHTML = '';
  if (q.tags) q.tags.slice(0, 3).forEach(tag => {
    const s = document.createElement('span');
    s.className = 'tag';
    s.textContent = tag;
    badges.appendChild(s);
  });

  // Update fav button
  const favBtn = document.getElementById('q-fav-btn');
  const isStarred = isFav(currentExamId, q.id);
  favBtn.classList.toggle('active', isStarred);
  favBtn.innerHTML = `<i class="ti ${isStarred ? 'ti-star-filled' : 'ti-star'}" aria-hidden="true"></i>`;
  favBtn.onclick = () => {
    const added = toggleFav(currentExamId, q.id);
    favBtn.classList.toggle('active', added);
    favBtn.innerHTML = `<i class="ti ${added ? 'ti-star-filled' : 'ti-star'}" aria-hidden="true"></i>`;
    showToast(added ? '⭐ Added to favorites' : 'Removed from favorites');
  };

  document.getElementById('q-choices').innerHTML = '';
  document.getElementById('q-drag-area').innerHTML = '';
  document.getElementById('q-feedback').style.display = 'none';
  document.getElementById('q-feedback').innerHTML = '';

  const actions = document.getElementById('q-actions');
  actions.innerHTML = '';

  if (q.type === 'single_choice' || q.type === 'multiple_choice') {
    renderChoiceQuestion(q);
  } else if (q.type === 'drag_and_drop') {
    renderDragQuestion(q);
  }
}

function renderChoiceQuestion(q) {
  const ul = document.getElementById('q-choices');
  const selected = new Set();

  q.choices.forEach(c => {
    const li = document.createElement('li');
    li.className = 'choice';
    li.dataset.id = c.id;
    li.innerHTML = `<span class="choice-id">${c.id}</span><span class="choice-text">${c.text}</span>`;
    li.addEventListener('click', () => {
      if (li.classList.contains('disabled')) return;
      if (q.type === 'single_choice') {
        ul.querySelectorAll('.choice').forEach(x => x.classList.remove('selected'));
        selected.clear();
      }
      if (selected.has(c.id)) { selected.delete(c.id); li.classList.remove('selected'); }
      else { selected.add(c.id); li.classList.add('selected'); }
      updateSubmitBtn();
    });
    ul.appendChild(li);
  });

  const actions = document.getElementById('q-actions');
  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn-primary';
  submitBtn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Submit';
  submitBtn.disabled = true;
  submitBtn.id = 'submit-btn';
  actions.appendChild(submitBtn);

  function updateSubmitBtn() {
    submitBtn.disabled = selected.size === 0;
  }

  submitBtn.addEventListener('click', () => {
    const correct = new Set(q.correct_answers);
    const isCorrect = selected.size === correct.size && [...selected].every(s => correct.has(s));

    ul.querySelectorAll('.choice').forEach(li => {
      const id = li.dataset.id;
      li.classList.add('disabled');
      li.classList.remove('selected');
      if (correct.has(id) && selected.has(id)) {
        li.classList.add('correct');
        li.innerHTML += '<i class="ti ti-check choice-icon" aria-hidden="true"></i>';
      } else if (!correct.has(id) && selected.has(id)) {
        li.classList.add('incorrect');
        li.innerHTML += '<i class="ti ti-x choice-icon" aria-hidden="true"></i>';
      } else if (correct.has(id) && !selected.has(id)) {
        li.classList.add('missed');
        li.innerHTML += '<i class="ti ti-arrow-right choice-icon" aria-hidden="true"></i>';
      }
    });

    showFeedback(isCorrect, q.explanation);
    markAndNext(q, isCorrect, actions);
  });
}

function renderDragQuestion(q) {
  const area = document.getElementById('q-drag-area');
  area.innerHTML = '';
  const mapping = {};

  const wrap = document.createElement('div');
  wrap.className = 'drag-area';

  const leftCol = document.createElement('div');
  leftCol.className = 'drag-col';
  leftCol.innerHTML = '<div class="drag-col-title">Items</div>';

  const rightCol = document.createElement('div');
  rightCol.className = 'drag-col';
  rightCol.innerHTML = '<div class="drag-col-title">Drop targets</div>';

  q.items.forEach(item => {
    const el = document.createElement('div');
    el.className = 'drag-item';
    el.draggable = true;
    el.dataset.itemId = item.id;
    el.textContent = item.text;

    el.addEventListener('dragstart', e => {
      e.dataTransfer.setData('itemId', item.id);
      el.classList.add('dragging');
    });
    el.addEventListener('dragend', () => el.classList.remove('dragging'));
    leftCol.appendChild(el);
  });

  q.targets.forEach(target => {
    const targetWrap = document.createElement('div');
    targetWrap.innerHTML = `<div class="drop-target-label">${target.label}</div>`;
    targetWrap.className = 'drop-target';
    targetWrap.dataset.targetId = target.id;

    targetWrap.addEventListener('dragover', e => { e.preventDefault(); targetWrap.classList.add('drag-over'); });
    targetWrap.addEventListener('dragleave', () => targetWrap.classList.remove('drag-over'));
    targetWrap.addEventListener('drop', e => {
      e.preventDefault();
      targetWrap.classList.remove('drag-over');
      const itemId = e.dataTransfer.getData('itemId');
      if (!itemId) return;

      Object.entries(mapping).forEach(([tid, iid]) => {
        if (iid === itemId) {
          delete mapping[tid];
          const prevTarget = area.querySelector(`[data-target-id="${tid}"]`);
          if (prevTarget) {
            const placed = prevTarget.querySelector('.drag-item');
            if (placed) prevTarget.removeChild(placed);
          }
        }
      });

      const existing = targetWrap.querySelector('.drag-item');
      if (existing) {
        const oldItemId = existing.dataset.itemId;
        delete mapping[target.id];
        const srcItem = area.querySelector(`.drag-col:first-child [data-item-id="${oldItemId}"]`);
        if (srcItem) { srcItem.classList.remove('used'); srcItem.draggable = true; }
        targetWrap.removeChild(existing);
      }

      const srcItem = area.querySelector(`[data-item-id="${itemId}"]`);
      if (srcItem) { srcItem.classList.add('used'); srcItem.draggable = false; }

      const clone = document.createElement('div');
      clone.className = 'drag-item';
      clone.dataset.itemId = itemId;
      const itemData = q.items.find(i => i.id === itemId);
      clone.textContent = itemData?.text || itemId;
      clone.innerHTML += ` <span class="remove-drop" data-remove="${target.id}" data-item="${itemId}" title="Remove">×</span>`;
      clone.querySelector('.remove-drop').addEventListener('click', () => {
        delete mapping[target.id];
        targetWrap.removeChild(clone);
        if (srcItem) { srcItem.classList.remove('used'); srcItem.draggable = true; }
        updateDragSubmit();
      });
      targetWrap.appendChild(clone);
      mapping[target.id] = itemId;
      updateDragSubmit();
    });

    rightCol.appendChild(targetWrap);
  });

  wrap.appendChild(leftCol);
  wrap.appendChild(rightCol);
  area.appendChild(wrap);

  const actions = document.getElementById('q-actions');
  const submitBtn = document.createElement('button');
  submitBtn.className = 'btn-primary';
  submitBtn.innerHTML = '<i class="ti ti-check" aria-hidden="true"></i> Submit';
  submitBtn.disabled = true;
  submitBtn.id = 'submit-btn';
  actions.appendChild(submitBtn);

  function updateDragSubmit() {
    submitBtn.disabled = Object.keys(mapping).length < q.targets.length;
  }

  submitBtn.addEventListener('click', () => {
    const correct = q.correct_mapping;
    let allCorrect = true;

    area.querySelectorAll('.drop-target').forEach(dt => {
      const tid = dt.dataset.targetId;
      const placedId = mapping[tid];
      const correctId = correct[tid];
      dt.querySelectorAll('.remove-drop').forEach(r => r.remove());
      if (placedId === correctId) {
        dt.classList.add('correct-target');
      } else {
        dt.classList.add('incorrect-target');
        allCorrect = false;
        if (correctId) {
          const correctItem = q.items.find(i => i.id === correctId);
          const hint = document.createElement('div');
          hint.style.cssText = 'font-size:12px;color:var(--green-text);padding:2px 6px;';
          hint.textContent = '✓ ' + (correctItem?.text || correctId);
          dt.appendChild(hint);
        }
      }
    });

    area.querySelectorAll('.drag-item').forEach(d => { d.draggable = false; d.classList.remove('used'); });
    showFeedback(allCorrect, q.explanation);
    markAndNext(q, allCorrect, actions);
  });
}

function showFeedback(isCorrect, explanation) {
  const fb = document.getElementById('q-feedback');
  fb.style.display = '';
  fb.className = 'feedback-box ' + (isCorrect ? 'feedback-correct' : 'feedback-incorrect');
  fb.innerHTML = `<strong>${isCorrect ? '✓ Correct!' : '✗ Incorrect'}</strong>${explanation ? '<br><span style="opacity:0.85">' + explanation + '</span>' : ''}`;
  fb.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
}

function markAndNext(q, isCorrect, actions) {
  sessionTotal++;
  if (isCorrect) sessionCorrect++;
  saveProgress(currentExamId, q.id, isCorrect ? 'correct' : 'wrong');

  const submitBtn = document.getElementById('submit-btn');
  if (submitBtn) submitBtn.remove();

  const nextBtn = document.createElement('button');
  nextBtn.className = 'btn-primary';
  const isLast = quizIndex >= quizQueue.length - 1;
  nextBtn.innerHTML = isLast
    ? '<i class="ti ti-flag" aria-hidden="true"></i> Finish'
    : '<i class="ti ti-arrow-right" aria-hidden="true"></i> Next';
  nextBtn.addEventListener('click', () => { quizIndex++; renderQuestion(); });
  actions.appendChild(nextBtn);

  // Reset this question button
  const resetQBtn = document.createElement('button');
  resetQBtn.className = 'btn-sm';
  resetQBtn.innerHTML = '<i class="ti ti-refresh" aria-hidden="true"></i> Try again';
  resetQBtn.title = 'Reset this question and answer again';
  resetQBtn.addEventListener('click', () => {
    // Remove progress for this specific question only
    if (store[currentExamId]?.progress) {
      delete store[currentExamId].progress[q.id];
      saveStore(store);
    }
    // Also undo session counts for this question
    sessionTotal--;
    if (isCorrect) sessionCorrect--;
    // Re-render the same question
    renderQuestion();
  });
  actions.appendChild(resetQBtn);

  const skipBtn = document.createElement('button');
  skipBtn.innerHTML = 'Skip <i class="ti ti-chevron-right" aria-hidden="true"></i>';
  skipBtn.style.display = 'none';
  actions.appendChild(skipBtn);
}

function showResults() {
  const total = quizQueue.length;
  const pct = total ? Math.round(sessionCorrect / total * 100) : 0;
  const prog = store[currentExamId]?.progress || {};
  const allQ = store[currentExamId]?.questions || [];
  const totalCorrect = Object.values(prog).filter(v => v === 'correct').length;
  const remaining = allQ.filter(q => prog[q.id] !== 'correct').length;

  document.getElementById('results-stats').innerHTML = `
    <div class="stat-card"><div class="stat-label">This session</div><div class="stat-value">${sessionCorrect} / ${total}</div></div>
    <div class="stat-card"><div class="stat-label">Score</div><div class="stat-value" style="color:${pct >= 70 ? 'var(--green-text)' : 'var(--red-text)'}">${pct}%</div></div>
    <div class="stat-card"><div class="stat-label">Overall correct</div><div class="stat-value" style="color:var(--green-text)">${totalCorrect} / ${allQ.length}</div></div>
    <div class="stat-card"><div class="stat-label">Still to master</div><div class="stat-value" style="color:var(--amber-text)">${remaining}</div></div>
  `;

  document.getElementById('results-continue-btn').style.display = remaining ? '' : 'none';
  showScreen('results');
}

document.getElementById('back-to-home').addEventListener('click', () => { showScreen('home'); renderHome(); });
document.getElementById('quiz-back-btn').addEventListener('click', () => {
  if (isFavoritesMode) { showScreen('home'); renderHome(); }
  else { openExamMenu(currentExamId); }
});
document.getElementById('start-quiz-btn').addEventListener('click', startQuiz);
document.getElementById('reset-progress-btn').addEventListener('click', () => {
  if (confirm('Reset all progress for this exam?')) { resetProgress(currentExamId); openExamMenu(currentExamId); }
});
document.getElementById('results-home-btn').addEventListener('click', () => { showScreen('home'); renderHome(); });
document.getElementById('results-continue-btn').addEventListener('click', () => {
  document.getElementById('filter-mode').value = 'unanswered';
  startQuiz();
});
document.getElementById('clear-all-btn').addEventListener('click', () => {
  if (confirm('Delete all exams and progress?')) { localStorage.removeItem(STORAGE_KEY); store = {}; renderHome(); }
});

document.getElementById('practice-favs-btn').addEventListener('click', startFavoritesPractice);

// Tab switching on home
document.querySelectorAll('.tab-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    document.querySelectorAll('.tab-btn').forEach(b => b.classList.remove('active'));

document.getElementById('upload-zone').addEventListener('dragover', e => { e.preventDefault(); document.getElementById('upload-zone').style.borderColor = 'var(--blue-border)'; });
document.getElementById('upload-zone').addEventListener('dragleave', () => { document.getElementById('upload-zone').style.borderColor = ''; });

// ─── Remote exam loading ──────────────────────────────────────────────
// Point this to your raw GitHub config file, e.g.:
// https://raw.githubusercontent.com/YOUR_USER/YOUR_REPO/main/exams/exams.config.json
// Leave empty string to disable remote loading.
const REMOTE_CONFIG_URL = '';

// Each remote exam gets a stable ID derived from its URL so progress
// persists across page reloads (unlike uploaded exams which use Date.now()).
function remoteExamId(url) {
  // Simple deterministic hash from URL string
  let h = 0;
  for (let i = 0; i < url.length; i++) { h = (Math.imul(31, h) + url.charCodeAt(i)) | 0; }
  return 'remote_' + Math.abs(h).toString(36);
}

async function loadRemoteExams() {
  if (!REMOTE_CONFIG_URL) return;
  const statusEl = document.getElementById('remote-status');
  statusEl.textContent = 'Loading exams from GitHub…';
  statusEl.style.color = 'var(--text-hint)';

  try {
    const cfgRes = await fetch(REMOTE_CONFIG_URL, { cache: 'no-cache' });
    if (!cfgRes.ok) throw new Error(`Config fetch failed: ${cfgRes.status}`);
    const cfg = await cfgRes.json();

    if (!Array.isArray(cfg.exams)) throw new Error('Config must have an "exams" array');

    let loaded = 0, skipped = 0;
    await Promise.all(cfg.exams.map(async entry => {
      const url = typeof entry === 'string' ? entry : entry.url;
      if (!url) return;
      const id = remoteExamId(url);

      // Only re-fetch if we don't already have this exam's questions cached
      // (progress is preserved either way)
      if (store[id]?.questions?.length) { skipped++; return; }

      try {
        const res = await fetch(url, { cache: 'no-cache' });
        if (!res.ok) throw new Error(`${res.status}`);
        const data = await res.json();
        if (!data.questions || !Array.isArray(data.questions)) throw new Error('Invalid format');
        const existing = store[id] || {};
        store[id] = {
          meta: { title: data.exam_metadata?.title || (typeof entry === 'object' && entry.title) || url.split('/').pop(), total: data.questions.length, remote: true, url },
          questions: data.questions,
          progress: existing.progress || {}
        };
        loaded++;
      } catch (err) {
        console.warn('Failed to load exam:', url, err.message);
      }
    }));

    saveStore(store);
    statusEl.textContent = loaded ? `✓ ${loaded} exam(s) loaded from GitHub` : skipped ? '✓ Exams up to date' : '⚠ No exams loaded';
    statusEl.style.color = loaded || skipped ? 'var(--green-text)' : 'var(--amber-text)';
  } catch (err) {
    statusEl.textContent = '⚠ Could not load remote exams: ' + err.message;
    statusEl.style.color = 'var(--red-text)';
    console.error(err);
  }

  renderHome();
}

// ─── Local file upload ────────────────────────────────────────────────
function loadJSON(file) {
  const reader = new FileReader();
  reader.onload = e => {
    try {
      const data = JSON.parse(e.target.result);
      if (!data.questions || !Array.isArray(data.questions)) throw new Error('Invalid format');
      const id = 'exam_' + Date.now();
      store[id] = {
        meta: { title: data.exam_metadata?.title || file.name, total: data.questions.length },
        questions: data.questions,
        progress: {}
      };
      saveStore(store);
      renderHome();
      showToast('Exam loaded: ' + store[id].meta.title);
    } catch (err) {
      showToast('Error: ' + err.message);
    }
  };
  reader.readAsText(file);
}

// ─── Init ─────────────────────────────────────────────────────────────
renderHome();
if (REMOTE_CONFIG_URL) {
  document.getElementById('refresh-remote-btn').style.display = '';
  loadRemoteExams();
}

document.getElementById('refresh-remote-btn').addEventListener('click', () => {
  // Force re-fetch by clearing cached questions for remote exams
  Object.entries(store).forEach(([id, data]) => {
    if (data.meta?.remote) delete store[id].questions;
  });
  loadRemoteExams();
});
</script>
